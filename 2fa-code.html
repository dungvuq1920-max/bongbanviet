<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2FA Code | BongBanViet Local</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--red:#d62b2b;--dark:#0f172a;--green:#16a34a;--yellow:#ca8a04;--danger:#dc2626}
html,body{min-height:100%}
body{background:var(--bg);color:var(--text);font-family:Inter,"Be Vietnam Pro",system-ui,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:18px}
.head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
.title h1{font-size:20px;font-weight:850}.title p{font-size:13px;color:var(--muted);margin-top:4px}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.panel h2{font-size:13px;font-weight:850;letter-spacing:.06em;text-transform:uppercase;margin-bottom:13px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:11px}
label{font-size:10px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.input-row{display:grid;grid-template-columns:1fr auto;gap:8px}
input{width:100%;border:1px solid var(--line);border-radius:7px;padding:11px 12px;font:14px Consolas,monospace;outline:none;background:#fff;color:var(--text)}
input:focus{border-color:var(--dark)}
.btn{border:0;border-radius:7px;padding:10px 14px;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.btn.primary{background:var(--red);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.light{background:#fff;color:var(--dark);border:1px solid var(--line)}
.btn:hover{filter:brightness(.97)}
.code-card{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.code-label{font-size:10px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.code{font:850 clamp(42px,9vw,72px)/1 Consolas,monospace;letter-spacing:0;cursor:pointer;user-select:none;color:var(--text)}
.copy-note{min-height:18px;text-align:center;font-size:12px;font-weight:800;color:var(--green);margin-top:6px}
.timer-row{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:8px}
.bar-bg{height:8px;border-radius:999px;background:#e2e8f0;overflow:hidden}.bar{height:100%;width:100%;background:var(--green);transition:width .25s linear,background .25s linear}
.status{font-size:12px;color:var(--muted);min-height:18px;margin-top:10px}.status.err{color:var(--danger)}
.hint{font-size:12px;line-height:1.55;color:var(--muted)}
@media(max-width:560px){.wrap{padding:12px}.head{align-items:flex-start;flex-direction:column}.input-row,.code-card{grid-template-columns:1fr}.code{font-size:44px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="title">
      <h1>2FA Code</h1>
      <p>Tạo mã TOTP 6 số từ secret key Base32, chạy trực tiếp trên trình duyệt.</p>
    </div>
    <button class="btn primary" type="button" onclick="generateCode()">Get Code</button>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>Secret key</h2>
      <div class="field">
        <label for="secret">Secret Key (Base32)</label>
        <div class="input-row">
          <input id="secret" type="password" autocomplete="off" spellcheck="false" placeholder="JBSWY3DPEHPK3PXP">
          <button class="btn light" id="toggleSecret" type="button" onclick="toggleSecret()">Hiện</button>
        </div>
      </div>
      <div class="input-row">
        <button class="btn primary" type="button" onclick="generateCode()">Get Code</button>
        <button class="btn dark" type="button" onclick="clearSecret()">Xóa</button>
      </div>
      <div class="status" id="status">Nhập secret key để bắt đầu.</div>
    </section>

    <section class="panel">
      <h2>Kết quả</h2>
      <div class="code-card">
        <div>
          <div class="code-label">Your 2FA Code</div>
          <div class="code" id="code" onclick="copyCode()">------</div>
        </div>
        <div>
          <button class="btn light" type="button" onclick="copyCode()">Copy</button>
          <div class="copy-note" id="copyNote"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="timer-row"><span>Expires in</span><span id="remaining">--s</span></div>
      <div class="bar-bg"><div class="bar" id="bar"></div></div>
      <div class="status hint">Mã tự cập nhật mỗi chu kỳ 30 giây sau khi secret hợp lệ.</div>
    </section>
  </div>
</div>

<script>
let activeSecret='';
let currentCode='';
let copyTimer=null;
function cleanSecret(value){return String(value||'').replace(/\s+/g,'').replace(/=+$/,'').toUpperCase()}
function base32ToBytes(secret){
  const alphabet='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits=0,value=0;
  const out=[];
  for(const ch of cleanSecret(secret)){
    const idx=alphabet.indexOf(ch);
    if(idx<0) throw new Error('Secret key không đúng định dạng Base32.');
    value=(value<<5)|idx;
    bits+=5;
    if(bits>=8){out.push((value>>>(bits-8))&255);bits-=8}
  }
  if(!out.length) throw new Error('Secret key không được để trống.');
  return new Uint8Array(out);
}
async function getTotp(secret){
  const keyBytes=base32ToBytes(secret);
  const key=await crypto.subtle.importKey('raw',keyBytes,{name:'HMAC',hash:'SHA-1'},false,['sign']);
  const now=Math.floor(Date.now()/1000);
  const counter=Math.floor(now/30);
  const msg=new ArrayBuffer(8);
  const view=new DataView(msg);
  view.setUint32(0,Math.floor(counter/0x100000000));
  view.setUint32(4,counter>>>0);
  const hmac=new Uint8Array(await crypto.subtle.sign('HMAC',key,msg));
  const offset=hmac[hmac.length-1]&15;
  const bin=((hmac[offset]&127)<<24)|(hmac[offset+1]<<16)|(hmac[offset+2]<<8)|hmac[offset+3];
  return {code:String(bin%1000000).padStart(6,'0'),remaining:30-(now%30)};
}
function setStatus(message,isError=false){const el=document.getElementById('status');el.textContent=message;el.classList.toggle('err',isError)}
function renderCode(code){currentCode=code||'';document.getElementById('code').textContent=code?`${code.slice(0,3)} ${code.slice(3)}`:'------'}
function renderTimer(remaining){
  const rem=Number.isFinite(remaining)?remaining:30;
  const ratio=Math.max(0,Math.min(1,rem/30));
  const bar=document.getElementById('bar');
  document.getElementById('remaining').textContent=Number.isFinite(remaining)?`${rem}s`:'--s';
  bar.style.width=`${ratio*100}%`;
  bar.style.background=ratio>.5?'var(--green)':ratio>.25?'var(--yellow)':'var(--danger)';
}
async function refreshCode(){
  if(!activeSecret) return;
  try{
    const result=await getTotp(activeSecret);
    renderCode(result.code);
    renderTimer(result.remaining);
  }catch{
    activeSecret='';
    renderCode('');
    renderTimer();
    setStatus('Secret key không hợp lệ. Kiểm tra lại rồi thử lại.',true);
  }
}
async function generateCode(){
  const secret=cleanSecret(document.getElementById('secret').value);
  if(!secret){activeSecret='';renderCode('');renderTimer();setStatus('Vui lòng nhập secret key.',true);return}
  try{
    activeSecret=secret;
    await refreshCode();
    setStatus('Code generated. Click code hoặc Copy để sao chép.');
  }catch(e){
    activeSecret='';
    renderCode('');
    renderTimer();
    setStatus(e.message||'Secret key không hợp lệ.',true);
  }
}
function toggleSecret(){
  const input=document.getElementById('secret');
  const show=input.type==='password';
  input.type=show?'text':'password';
  document.getElementById('toggleSecret').textContent=show?'Ẩn':'Hiện';
}
function clearSecret(){
  activeSecret='';
  currentCode='';
  document.getElementById('secret').value='';
  renderCode('');
  renderTimer();
  setStatus('Nhập secret key để bắt đầu.');
  document.getElementById('copyNote').textContent='';
}
async function copyCode(){
  if(!currentCode) return;
  await navigator.clipboard.writeText(currentCode);
  const note=document.getElementById('copyNote');
  note.textContent='Copied!';
  clearTimeout(copyTimer);
  copyTimer=setTimeout(()=>{note.textContent=''},1400);
}
document.getElementById('secret').addEventListener('keydown',e=>{if(e.key==='Enter') generateCode()});
setInterval(refreshCode,500);
renderTimer();
</script>
</body>
</html>
