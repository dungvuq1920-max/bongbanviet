<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Douyin Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --accent:#E8503A;
      --accent-dark:#C43A26;
      --bg:#F5F5F5;
      --card:#FFFFFF;
      --dark:#111111;
      --mid:#6B7280;
      --line:#E5E7EB;
      --green:#16a34a;
      --red:#DC2626;
    }
    body{background:var(--bg);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px}
    a{text-decoration:none;color:inherit}

    /* Main card */
    .card{width:100%;max-width:820px;background:var(--card);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.06);overflow:hidden}

    /* Header */
    .header{padding:40px 48px 0;text-align:center}
    .icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#FF6B5B,#E8503A);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 4px 16px rgba(232,80,58,.35)}
    .title{font-size:24px;font-weight:700;color:var(--dark);letter-spacing:-.01em}
    .subtitle{font-size:13px;color:var(--mid);margin-top:4px}

    /* Tab bar */
    .tabs{display:flex;margin:28px 48px 0;background:#F3F4F6;border-radius:100px;padding:4px;gap:2px}
    .tab{flex:1;padding:9px 8px;border-radius:100px;border:none;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(232,80,58,.3)}
    .tab:hover:not(.active){color:var(--dark)}

    /* Panel */
    .panel{padding:28px 48px 40px;display:none}
    .panel.active{display:block}

    /* Input */
    .input-wrap{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--line);transition:border-color .2s;margin-bottom:8px}
    .input-wrap:focus-within{border-color:#9CA3AF}
    .url-input{flex:1;padding:13px 16px;border:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--dark);background:transparent;outline:none;min-width:0}
    .url-input::placeholder{color:#9CA3AF}
    .btn-resolve{padding:10px 20px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:background .2s;border-radius:7px;margin:4px}
    .btn-resolve:hover{background:var(--accent-dark)}
    .btn-resolve:disabled{opacity:.5;cursor:not-allowed}
    .input-hint{font-size:12px;color:#9CA3AF;margin-bottom:20px}

    /* Batch textarea */
    .batch-area{width:100%;min-height:150px;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);outline:none;resize:vertical;transition:border-color .2s;line-height:1.7;background:transparent}
    .batch-area:focus{border-color:#9CA3AF}
    .batch-area::placeholder{color:#9CA3AF}
    .batch-meta{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
    .url-count{font-size:12px;color:#9CA3AF}
    .btn-full{width:100%;padding:13px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;border-radius:10px;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-full:hover{background:var(--accent-dark)}
    .btn-full:disabled{opacity:.45;cursor:not-allowed;background:#9CA3AF}

    /* Messages */
    .msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
    .msg-err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
    .msg-load{background:#F9FAFB;border:1px solid var(--line);color:var(--mid);display:flex;align-items:center;gap:10px}
    .spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    .spinner-sm{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Preview card */
    .preview{border:1.5px solid var(--line);border-radius:12px;overflow:hidden;display:none;margin-top:4px}
    .preview-row{display:flex}
    .thumb-wrap{width:140px;flex-shrink:0;background:#111;position:relative;overflow:hidden}
    .thumb-wrap img{width:100%;height:100%;object-fit:cover}
    .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px}
    .preview-info{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
    .preview-title{font-size:15px;font-weight:600;color:var(--dark);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .meta{display:flex;flex-direction:column;gap:5px}
    .meta-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mid)}
    .meta-item svg{flex-shrink:0;opacity:.5}
    .btn-dl{margin-top:auto;padding:11px 16px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;width:100%}
    .btn-dl:hover{background:var(--accent-dark)}
    .btn-dl:disabled{opacity:.5;cursor:not-allowed}

    /* Gallery */
    .gallery-wrap{padding:16px 20px;background:#FFFBEB;border-top:1.5px solid #FDE68A;font-size:13px;color:#92400E;display:none}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:4px;margin-top:10px}
    .gallery-grid img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;border-radius:4px;transition:opacity .15s}
    .gallery-grid img:hover{opacity:.8}

    /* Results list */
    .results{margin-top:14px;display:flex;flex-direction:column;gap:6px}
    .result-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:var(--card)}
    .result-item.err{background:#FEF2F2;border-color:#FECACA}
    .r-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#F3F4F6}
    .r-thumb-ph{width:48px;height:48px;border-radius:6px;flex-shrink:0;background:#F3F4F6;display:flex;align-items:center;justify-content:center}
    .r-info{flex:1;min-width:0}
    .r-title{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-sub{font-size:11px;color:var(--mid);margin-top:1px}
    .r-err{font-size:12px;color:#991B1B}
    .badge-sm{display:inline-block;padding:2px 7px;background:#F3F4F6;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);border-radius:4px;flex-shrink:0}
    .badge-sm.album{background:#FEF3C7;color:#92400E}
    .btn-sm{flex-shrink:0;padding:7px 14px;background:var(--dark);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:6px;transition:background .2s;white-space:nowrap}
    .btn-sm:hover{background:var(--accent)}
    .btn-sm:disabled{opacity:.45;cursor:not-allowed;background:#9CA3AF}
    .btn-sm.album{background:#FEF3C7;color:#92400E}
    .btn-sm.album:hover{background:#FDE68A}

    /* Download all bar */
    .dl-all-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .dl-all-count{font-size:12px;color:var(--mid)}
    .btn-dl-all{padding:7px 16px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:6px;transition:background .2s}
    .btn-dl-all:hover{background:var(--accent-dark)}

    /* User header */
    .user-header{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--card)}
    .user-av{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#F3F4F6}
    .user-av-ph{width:48px;height:48px;border-radius:50%;flex-shrink:0;background:#F3F4F6;display:flex;align-items:center;justify-content:center}
    .user-name{font-size:15px;font-weight:700;color:var(--dark)}
    .user-count{font-size:12px;color:var(--mid)}
    .btn-more{width:100%;margin-top:10px;padding:11px;background:#F9FAFB;color:var(--dark);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);border-radius:8px;transition:all .2s}
    .btn-more:hover{background:var(--line)}
    .btn-more:disabled{opacity:.45;cursor:not-allowed}

    @media(max-width:600px){
      body{padding:0;align-items:flex-start}
      .card{border-radius:0;min-height:100vh;box-shadow:none}
      .header,.tabs,.panel{padding-left:20px;padding-right:20px}
      .tabs{margin-left:20px;margin-right:20px}
      .preview-row{flex-direction:column}
      .thumb-wrap{width:100%;height:200px}
      .preview-info{padding:16px}
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>
    <p class="title">Douyin Downloader</p>
    <p class="subtitle">Tải video &amp; ảnh không watermark</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabS" onclick="sw('single')">Video Đơn</button>
    <button class="tab" id="tabB" onclick="sw('batch')">Hàng Loạt</button>
    <button class="tab" id="tabU" onclick="sw('user')">Video Kênh</button>
  </div>

  <!-- ── SINGLE ─────────────────────────────────────────────────────── -->
  <div class="panel active" id="pSingle">
    <div class="input-wrap">
      <input id="sUrl" class="url-input" type="text"
        placeholder="Dán link Douyin hoặc v.douyin.com..."
        autocomplete="off" spellcheck="false">
      <button class="btn-resolve" id="sBtn" onclick="doResolve()">Xem Trước</button>
    </div>
    <p class="input-hint">Link đầy đủ hoặc link rút gọn đều được</p>

    <div class="msg msg-err" id="sErr"></div>
    <div class="msg msg-load" id="sLoad"><div class="spinner"></div><span>Đang lấy thông tin...</span></div>

    <div class="preview" id="sPrev">
      <div class="preview-row">
        <div class="thumb-wrap" id="sThumbWrap">
          <img id="sThumb" src="" alt="">
          <span class="badge" id="sBadge">Video</span>
        </div>
        <div class="preview-info">
          <p class="preview-title" id="sTitle"></p>
          <div class="meta">
            <div class="meta-item">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span id="sAuthor"></span>
            </div>
            <div class="meta-item" id="sDurRow" style="display:none">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span id="sDur"></span>
            </div>
          </div>
          <button class="btn-dl" id="sDlBtn" onclick="doDownload()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Tải Video
          </button>
        </div>
      </div>
      <div class="gallery-wrap" id="sGallery">
        <strong>Album ảnh.</strong> Nhấn từng ảnh để tải.
        <div class="gallery-grid" id="sGalleryGrid"></div>
      </div>
    </div>
  </div>

  <!-- ── BATCH ──────────────────────────────────────────────────────── -->
  <div class="panel" id="pBatch">
    <textarea id="bArea" class="batch-area"
      placeholder="Dán mỗi link trên một dòng:&#10;https://www.douyin.com/video/123...&#10;https://v.douyin.com/abc...&#10;..."
      oninput="onBInput()"></textarea>
    <div class="batch-meta">
      <span class="url-count"><strong id="bCount">0</strong> URLs · tối đa 50</span>
    </div>
    <button class="btn-full" id="bBtn" onclick="doBatch()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Resolve All
    </button>
    <div class="msg msg-err" id="bErr" style="margin-top:14px"></div>
    <div class="msg msg-load" id="bLoad" style="margin-top:14px"><div class="spinner"></div><span id="bLoadTxt">Đang xử lý...</span></div>
    <div id="bResults"></div>
  </div>

  <!-- ── USER ───────────────────────────────────────────────────────── -->
  <div class="panel" id="pUser">
    <div class="input-wrap">
      <input id="uUrl" class="url-input" type="text"
        placeholder="https://www.douyin.com/user/MS4wLj..."
        autocomplete="off" spellcheck="false">
      <button class="btn-resolve" id="uBtn" onclick="doUser()">Tải Danh Sách</button>
    </div>
    <p class="input-hint">Dán link trang cá nhân Douyin</p>
    <div class="msg msg-err" id="uErr"></div>
    <div class="msg msg-load" id="uLoad"><div class="spinner"></div><span>Đang tải danh sách video...</span></div>
    <div id="uResults"></div>
  </div>
</div>

<script>
var _awemeId = null, _isGallery = false;
var _bResolved = [];
var _uUrl = '', _uCursor = 0, _uHasMore = false, _uCount = 0;

// ── Tab ───────────────────────────────────────────────────────────────────────
function sw(t) {
  var tabs = {single:'pSingle',batch:'pBatch',user:'pUser'};
  var btns = {single:'tabS',batch:'tabB',user:'tabU'};
  Object.keys(tabs).forEach(function(k){
    document.getElementById(tabs[k]).classList.toggle('active', k===t);
    document.getElementById(btns[k]).classList.toggle('active', k===t);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function show(id,flex){ $(id).style.display = flex?'flex':'block'; }
function hide(id){ $(id).style.display='none'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDur(s){ if(!s)return''; var m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
function dl(awemeId){ var a=document.createElement('a'); a.href='/api/douyin/stream/'+encodeURIComponent(awemeId); a.download=''; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function thumbUrl(u){ return '/api/douyin/image?url='+encodeURIComponent(u); }

// ── SINGLE ────────────────────────────────────────────────────────────────────
async function doResolve(){
  var url=$('sUrl').value.trim(); if(!url)return;
  hide('sErr'); hide('sPrev'); show('sLoad',true); $('sBtn').disabled=true; _awemeId=null;
  try{
    var r=await fetch('/api/douyin/resolve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url})});
    var d=await r.json(); if(!r.ok) throw new Error(d.detail||'Lỗi lấy thông tin video.');
    _awemeId=d.aweme_id; _isGallery=d.media_type==='gallery';
    $('sTitle').textContent=d.title||'Không có tiêu đề';
    $('sAuthor').textContent='@'+(d.author||'unknown');
    $('sBadge').textContent=_isGallery?'Album':'Video';
    if(d.duration){$('sDur').textContent=fmtDur(d.duration);show('sDurRow');}else{hide('sDurRow');}
    if(d.cover_url){$('sThumb').src=thumbUrl(d.cover_url);show('sThumbWrap');show('sPrev');}else{hide('sThumbWrap');show('sPrev');}
    if(_isGallery){ hide('sDlBtn'); show('sGallery'); renderGallery(d.image_urls||[]); }
    else{ show('sDlBtn'); hide('sGallery'); }
    hide('sLoad'); show('sPrev');
  }catch(e){ hide('sLoad'); var eb=$('sErr'); eb.textContent=e.message; eb.style.display='block'; }
  finally{ $('sBtn').disabled=false; }
}

function renderGallery(urls){
  $('sGalleryGrid').innerHTML='';
  urls.forEach(function(url,i){
    var img=document.createElement('img'); var p=thumbUrl(url);
    img.src=p; img.alt=''; img.title='Tải ảnh '+(i+1);
    img.onclick=function(){var a=document.createElement('a');a.href=p;a.download='img_'+(i+1)+'.jpg';a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);};
    $('sGalleryGrid').appendChild(img);
  });
}

function doDownload(){
  if(!_awemeId)return;
  var btn=$('sDlBtn'); btn.disabled=true;
  btn.innerHTML='<div class="spinner-sm"></div> Đang chuẩn bị...';
  dl(_awemeId);
  setTimeout(function(){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Tải Video';},4000);
}

$('sUrl').addEventListener('keydown',function(e){if(e.key==='Enter')doResolve();});

// ── BATCH ─────────────────────────────────────────────────────────────────────
function getUrls(){ return $('bArea').value.split('\n').map(function(l){return l.trim();}).filter(Boolean).slice(0,50); }

function onBInput(){
  var n=getUrls().length;
  $('bCount').textContent=n;
  $('bBtn').disabled=n===0;
}

async function doBatch(){
  var urls=getUrls(); if(!urls.length)return;
  hide('bErr'); $('bResults').innerHTML=''; show('bLoad',true);
  $('bLoadTxt').textContent='Đang xử lý '+urls.length+' URL...';
  $('bBtn').disabled=true; _bResolved=[];
  try{
    var r=await fetch('/api/douyin/resolve-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({urls:urls})});
    var d=await r.json(); if(!r.ok) throw new Error(d.detail||'Lỗi batch resolve.');
    _bResolved=d.results||[]; hide('bLoad'); renderBatch(_bResolved);
  }catch(e){ hide('bLoad'); var eb=$('bErr'); eb.textContent=e.message; eb.style.display='block'; }
  finally{ $('bBtn').disabled=false; }
}

function renderBatch(results){
  var ok=results.filter(function(r){return r.video;});
  var cont=$('bResults'); cont.innerHTML='';
  if(!results.length)return;

  if(ok.length>1){
    var bar=document.createElement('div'); bar.className='dl-all-bar'; bar.style.marginTop='14px';
    bar.innerHTML='<span class="dl-all-count">'+ok.length+'/'+results.length+' video thành công</span>'+
      '<button class="btn-dl-all" onclick="dlAll()">Tải Tất Cả ('+ok.length+')</button>';
    cont.appendChild(bar);
  }

  var list=document.createElement('div'); list.className='results';
  if(ok.length<=1) list.style.marginTop='14px';

  results.forEach(function(item,i){
    var div=document.createElement('div');
    if(item.error){
      div.className='result-item err';
      div.innerHTML='<div class="r-thumb-ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>'+
        '<div class="r-info"><p class="r-title" style="color:#991B1B">Lỗi</p><p class="r-err">'+(item.error||item.url||'')+'</p></div>';
    } else {
      var v=item.video, alb=v.media_type==='gallery';
      div.className='result-item';
      var th=v.cover_url?'<img class="r-thumb" src="'+thumbUrl(v.cover_url)+'" alt="">':
        '<div class="r-thumb-ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>';
      var btnH=alb
        ?'<button class="btn-sm album" onclick="dlAlbumBatch('+i+')">Xem Ảnh</button>'
        :'<button class="btn-sm" onclick="dlBatchItem(\''+v.aweme_id+'\',this)">Tải</button>';
      div.innerHTML=th+
        '<div class="r-info"><p class="r-title">'+esc(v.title||'Không có tiêu đề')+'</p>'+
        '<p class="r-sub">@'+esc(v.author||'')+(v.duration?' · '+fmtDur(v.duration):'')+'</p></div>'+
        '<span class="badge-sm'+(alb?' album':'')+'">'+( alb?'Album':'Video')+'</span>'+btnH;
    }
    list.appendChild(div);
  });
  cont.appendChild(list);
}

function dlBatchItem(id,btn){
  if(btn){btn.disabled=true;btn.textContent='...';}
  dl(id);
  setTimeout(function(){if(btn){btn.disabled=false;btn.textContent='Tải';}},4000);
}

function dlAll(){
  var delay=0;
  _bResolved.forEach(function(item){
    if(item.video&&item.video.media_type!=='gallery'){
      setTimeout(function(){dl(item.video.aweme_id);},delay); delay+=700;
    }
  });
}

function dlAlbumBatch(i){
  var item=_bResolved[i]; if(!item||!item.video)return;
  (item.video.image_urls||[]).forEach(function(url,j){
    setTimeout(function(){
      var a=document.createElement('a');a.href=thumbUrl(url);a.download='album_'+(j+1)+'.jpg';a.target='_blank';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    },j*500);
  });
}

// ── USER ──────────────────────────────────────────────────────────────────────
async function doUser(){
  var url=$('uUrl').value.trim(); if(!url)return;
  hide('uErr'); $('uResults').innerHTML=''; show('uLoad',true); $('uBtn').disabled=true;
  _uUrl=url; _uCursor=0; _uHasMore=false; _uCount=0;
  await fetchUser(true);
  $('uBtn').disabled=false;
}

async function fetchUser(first){
  try{
    var r=await fetch('/api/douyin/user-posts',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:_uUrl,cursor:_uCursor,count:20})});
    var d=await r.json(); if(!r.ok) throw new Error(d.detail||'Không thể tải danh sách video.');
    _uHasMore=d.has_more; _uCursor=d.next_cursor; _uCount+=(d.videos||[]).length;
    hide('uLoad'); renderUser(d,first);
  }catch(e){ hide('uLoad'); var eb=$('uErr'); eb.textContent=e.message; eb.style.display='block'; }
}

function renderUser(d,first){
  var cont=$('uResults');
  if(first){
    cont.innerHTML='';
    var u=d.user||{};
    var avH=u.avatar_url?'<img class="user-av" src="'+thumbUrl(u.avatar_url)+'" alt="">':
      '<div class="user-av-ph"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
    var hdr=document.createElement('div'); hdr.className='user-header';
    hdr.innerHTML=avH+'<div><p class="user-name">'+esc(u.nickname||'Người dùng Douyin')+'</p><p class="user-count" id="uCount">Đang tải...</p></div>';
    cont.appendChild(hdr);
    var list=document.createElement('div'); list.className='results'; list.id='uList';
    cont.appendChild(list);
  }
  var cEl=$('uCount'); if(cEl) cEl.textContent=_uCount+' video'+(_uHasMore?' (còn thêm)':'');
  var list=$('uList');
  (d.videos||[]).forEach(function(v){
    var div=document.createElement('div'); div.className='result-item';
    var alb=v.media_type==='gallery';
    var th=v.cover_url?'<img class="r-thumb" src="'+thumbUrl(v.cover_url)+'" alt="">':
      '<div class="r-thumb-ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>';
    var btnH=alb?'<button class="btn-sm album">Album</button>':
      '<button class="btn-sm" onclick="dlBatchItem(\''+v.aweme_id+'\',this)">Tải</button>';
    div.innerHTML=th+'<div class="r-info"><p class="r-title">'+esc(v.title||'Không có tiêu đề')+'</p>'+
      '<p class="r-sub">@'+esc(v.author||'')+(v.duration?' · '+fmtDur(v.duration):'')+'</p></div>'+
      '<span class="badge-sm'+(alb?' album':'')+'">'+( alb?'Album':'Video')+'</span>'+btnH;
    list.appendChild(div);
  });

  var old=$('btnMore'); if(old)old.remove();
  if(_uHasMore){
    var btn=document.createElement('button'); btn.className='btn-more'; btn.id='btnMore'; btn.textContent='Tải Thêm';
    btn.onclick=async function(){btn.disabled=true;btn.textContent='Đang tải...';await fetchUser(false);};
    cont.appendChild(btn);
  }
}

$('uUrl').addEventListener('keydown',function(e){if(e.key==='Enter')doUser();});
</script>
</body>
